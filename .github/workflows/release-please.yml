name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Auto-merge minor/patch releases, require manual merge for major releases
  auto-merge-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr && !needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if major release
        id: check-major
        run: |
          # Get current version from manifest
          CURRENT_VERSION=$(jq -r '.[]' .release-please-manifest.json | head -1)
          CURRENT_MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)

          # Get the PR number
          PR_NUMBER=$(echo '${{ needs.release-please.outputs.pr }}' | jq -r '.number')

          # Get the proposed version from the PR title (format: "chore(main): release X.Y.Z")
          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PROPOSED_VERSION=$(echo "$PR_TITLE" | grep -oP '\d+\.\d+\.\d+' || echo "")

          if [ -z "$PROPOSED_VERSION" ]; then
            echo "Could not determine proposed version from PR title: $PR_TITLE"
            echo "is_major=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PROPOSED_MAJOR=$(echo $PROPOSED_VERSION | cut -d. -f1)

          echo "Current version: $CURRENT_VERSION (major: $CURRENT_MAJOR)"
          echo "Proposed version: $PROPOSED_VERSION (major: $PROPOSED_MAJOR)"

          if [ "$PROPOSED_MAJOR" -gt "$CURRENT_MAJOR" ]; then
            echo "This is a MAJOR release - requires manual merge"
            echo "is_major=true" >> $GITHUB_OUTPUT
          else
            echo "This is a minor/patch release - will auto-merge"
            echo "is_major=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge release PR
        if: steps.check-major.outputs.is_major == 'false'
        run: |
          PR_NUMBER=$(echo '${{ needs.release-please.outputs.pr }}' | jq -r '.number')
          echo "Auto-merging PR #$PR_NUMBER (minor/patch release)"
          gh pr merge $PR_NUMBER --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and upload binaries when a release is created
  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cu-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: cu-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cu-macos-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/cu ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ matrix.artifact }}
