name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # Needed so the auto-merge job can dispatch a follow-up run of this same
  # workflow after merging the release PR (see "Re-trigger after auto-merge"
  # step below). Without that follow-up, GHA suppresses the trigger that would
  # normally fire from the merge push (loop prevention for GITHUB_TOKEN-driven
  # pushes), and the build/upload-release jobs never run.
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Auto-merge minor/patch releases, require manual merge for major releases
  auto-merge-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if major release
        id: check-major
        # PR_JSON is passed via env (not inline ${{ }} substitution into the
        # shell body) because the PR body contains user-supplied changelog
        # text — apostrophes (e.g. "can't"), backticks, parens, and `$()` would
        # otherwise either break the shell parser (current bug) or execute as
        # commands (script-injection vector). See GHA security hardening:
        # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        env:
          PR_JSON: ${{ needs.release-please.outputs.pr }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get current version from manifest
          CURRENT_VERSION=$(jq -r '.[]' .release-please-manifest.json | head -1)
          CURRENT_MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)

          # Get the PR number — read from $PR_JSON, never inline the JSON
          PR_NUMBER=$(jq -r '.number' <<<"$PR_JSON")

          # Get the proposed version from the PR title (format: "chore(main): release X.Y.Z")
          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title -q '.title')
          PROPOSED_VERSION=$(echo "$PR_TITLE" | grep -oP '\d+\.\d+\.\d+' || echo "")

          if [ -z "$PROPOSED_VERSION" ]; then
            echo "Could not determine proposed version from PR title: $PR_TITLE"
            echo "is_major=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PROPOSED_MAJOR=$(echo "$PROPOSED_VERSION" | cut -d. -f1)

          echo "Current version: $CURRENT_VERSION (major: $CURRENT_MAJOR)"
          echo "Proposed version: $PROPOSED_VERSION (major: $PROPOSED_MAJOR)"

          if [ "$PROPOSED_MAJOR" -gt "$CURRENT_MAJOR" ]; then
            echo "This is a MAJOR release - requires manual merge"
            echo "is_major=true" >> "$GITHUB_OUTPUT"
          else
            echo "This is a minor/patch release - will auto-merge"
            echo "is_major=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge release PR
        if: steps.check-major.outputs.is_major == 'false'
        env:
          PR_JSON: ${{ needs.release-please.outputs.pr }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(jq -r '.number' <<<"$PR_JSON")
          echo "Auto-merging PR #$PR_NUMBER (minor/patch release)"
          gh pr merge "$PR_NUMBER" --squash || echo "Auto-merge failed, PR may need manual merge"

      # GHA suppresses workflow triggers from pushes made with the default
      # GITHUB_TOKEN (loop prevention). The merge above therefore won't
      # re-trigger this workflow on the new HEAD, which means release-please
      # never runs the second pass that detects the merged PR and creates the
      # release tag — leaving the release pipeline stuck without the actual
      # release. workflow_dispatch is allowed even from GITHUB_TOKEN, so we
      # explicitly kick the workflow off again here.
      - name: Re-trigger workflow to publish release after auto-merge
        if: steps.check-major.outputs.is_major == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Dispatching release-please.yml to publish the release"
          gh workflow run release-please.yml --ref main \
              || echo "Self-dispatch failed — run gh workflow run release-please.yml --ref main manually"

  # Build binaries for all platforms when a release is created
  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/unleash unleash-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/splash splash-${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            unleash-${{ matrix.suffix }}
            splash-${{ matrix.suffix }}

  # Collect all binaries and upload to release
  upload-release:
    needs: [release-please, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum unleash-* splash-* > checksums.txt
          cat checksums.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            binaries/unleash-linux-x86_64
            binaries/unleash-linux-aarch64
            binaries/unleash-macos-x86_64
            binaries/unleash-macos-aarch64
            binaries/splash-linux-x86_64
            binaries/splash-linux-aarch64
            binaries/splash-macos-x86_64
            binaries/splash-macos-aarch64
            binaries/checksums.txt
