name: Integration Tests

# Tests plugins and patches functionality
# Runs on push to main and PRs

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/integration-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck Linting
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
          ignore_paths: 'scripts/patches'

      - name: ShellCheck tests
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './tests'
          severity: warning

  test-cutx:
    name: Test cutx (Headless Mode)
    runs-on: self-hosted
    strategy:
      matrix:
        os: [self-hosted]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Make test scripts executable
        run: chmod +x tests/*.sh scripts/cutx

      - name: Run cutx tests
        run: ./tests/test-cutx.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cutx-test-results-${{ matrix.os }}
          path: |
            ~/.cache/claude-unleashed/cutx/*.output
            ~/.cache/claude-unleashed/cutx/*.marker
          retention-days: 7
          if-no-files-found: ignore

  test-plugins:
    name: Test Plugins
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Make test scripts executable
        run: chmod +x tests/*.sh

      - name: Run plugin tests
        run: ./tests/test-plugins.sh

  test-patches:
    name: Test Patches
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Make test scripts executable
        run: chmod +x tests/*.sh scripts/*.sh

      - name: Run patch tests
        run: ./tests/test-patches.sh

  test-patches-matrix:
    name: Test Patches (${{ matrix.version }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version: ["2.1.0", "2.1.2", "2.1.3", "2.1.4", "2.1.5"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Make scripts executable
        run: chmod +x tests/*.sh scripts/*.sh

      - name: Create version-specific mock environment
        run: |
          MOCK_DIR=$(mktemp -d)
          echo "MOCK_DIR=$MOCK_DIR" >> $GITHUB_ENV

          # Source the version config
          source scripts/patches/versions/${{ matrix.version }}.conf

          # Create mock cli.js with version-specific patterns
          cat > "$MOCK_DIR/cli.js" << MOCKEOF
          // Mock cli.js for ${{ matrix.version }}
          ${MODES_ARRAY_VAR}=["acceptEdits","bypassPermissions","default","delegate","dontAsk","plan"];
          function getModeName(mode){switch(mode){case"plan":return"Plan Mode";case"bypassPermissions":return"Bypass Permissions";case"acceptEdits":return"Accept Edits";default:return"Default"}}
          function getModeIcon(mode){switch(mode){case"acceptEdits":return"⏵⏵";case"bypassPermissions":return"⏵⏵";default:return"▶"}}
          function getNextMode(mode){switch(mode){case"default":return"plan";case"plan":return"bypassPermissions";case"bypassPermissions":return"default"}}
          if(Z.toolPermissionContext.mode==="bypassPermissions"||Z.toolPermissionContext.mode==="plan"){allowTool()}
          if(Q.mode==="bypassPermissions"){passthrough()}
          if(${PERMISSION_CTX_VAR}.mode==="bypassPermissions"||V){allow()}
          function getModeColor(mode){switch(mode){case"plan":return"planMode";case"acceptEdits":return"autoAccept";case"bypassPermissions":return"error";default:return"default"}}
          if(${MODE_VAR}==="acceptEdits")${TELEMETRY_FN}("auto-accept-mode");
          if(B.mode==="delegate"&&${MODE_VAR}!=="delegate")${DELEGATE_FN1}(!0),${DELEGATE_FN2}(!0);
          MOCKEOF

          # Create mock claude binary
          cat > "$MOCK_DIR/claude" << SCRIPTEOF
          #!/usr/bin/env bash
          if [[ "\$1" == "--version" ]]; then
            echo "${{ matrix.version }} (Claude Code)"
            exit 0
          fi
          exec node "$MOCK_DIR/cli.js" "\$@"
          SCRIPTEOF
          chmod +x "$MOCK_DIR/claude"

      - name: Apply patches for version ${{ matrix.version }}
        run: |
          CLAUDE_BIN="$MOCK_DIR/claude" ./scripts/patch-claude.sh

      - name: Verify all patches for version ${{ matrix.version }}
        run: |
          CLI="$MOCK_DIR/cli.js"
          source scripts/patches/versions/${{ matrix.version }}.conf

          echo "Verifying patches for version ${{ matrix.version }}..."

          # Patch 1: auto in modes array
          grep -q "${MODES_ARRAY_VAR}=\[.*\"auto\"" "$CLI" || (echo "FAIL: Patch 1 - auto not in modes array" && exit 1)
          echo "✓ Patch 1: auto added to modes array (${MODES_ARRAY_VAR})"

          # Patch 2: display name
          grep -q 'case"auto":return"Auto Mode"' "$CLI" || (echo "FAIL: Patch 2 - display name missing" && exit 1)
          echo "✓ Patch 2: display name added"

          # Patch 3: icon
          grep -q 'case"auto":return"»»"' "$CLI" || (echo "FAIL: Patch 3 - icon missing" && exit 1)
          echo "✓ Patch 3: icon added"

          # Patch 4: cycling logic (check BOTH patterns)
          grep -q 'case"bypassPermissions":return"auto"' "$CLI" || (echo "FAIL: Patch 4a - bypass->auto cycling missing" && exit 1)
          grep -q 'case"auto":return"default"' "$CLI" || (echo "FAIL: Patch 4b - auto->default cycling missing" && exit 1)
          echo "✓ Patch 4: cycling logic updated (bypass->auto->default)"

          # Patch 5a: Main permission check (Z.toolPermissionContext)
          grep -q 'mode==="auto"||Z\.toolPermissionContext\.mode==="plan"' "$CLI" || (echo "FAIL: Patch 5a - main permission check missing" && exit 1)
          echo "✓ Patch 5a: main permission check updated"

          # Patch 5b: Q.mode passthrough
          grep -q 'Q\.mode==="bypassPermissions"||Q\.mode==="auto"' "$CLI" || (echo "FAIL: Patch 5b - Q.mode passthrough missing" && exit 1)
          echo "✓ Patch 5b: Q.mode passthrough updated"

          # Patch 5c: Permission context variable check
          grep -q "${PERMISSION_CTX_VAR}\.mode===\"auto\"" "$CLI" || (echo "FAIL: Patch 5c - ${PERMISSION_CTX_VAR}.mode check missing" && exit 1)
          echo "✓ Patch 5c: ${PERMISSION_CTX_VAR}.mode permission check updated"

          # Patch 6: color
          grep -q 'case"auto":return"warning"' "$CLI" || (echo "FAIL: Patch 6 - color missing" && exit 1)
          echo "✓ Patch 6: warning color added"

          # Patch 7a: flag file creation
          grep -q "${MODE_VAR}===\"auto\")import(\"fs\")" "$CLI" || (echo "FAIL: Patch 7a - flag creation pattern missing" && exit 1)
          grep -q 'mkdirSync' "$CLI" && grep -q 'auto-mode' "$CLI" || (echo "FAIL: Patch 7a - flag creation logic missing" && exit 1)
          echo "✓ Patch 7a: flag file creation injected (${MODE_VAR})"

          # Patch 7b: flag file removal
          grep -q 'B\.mode==="auto"' "$CLI" || (echo "FAIL: Patch 7b - auto mode exit check missing" && exit 1)
          grep -q 'unlinkSync' "$CLI" || (echo "FAIL: Patch 7b - flag removal missing" && exit 1)
          echo "✓ Patch 7b: flag file removal injected"

          echo "All patches verified for version ${{ matrix.version }}!"

      - name: Test idempotency for version ${{ matrix.version }}
        run: |
          output=$(CLAUDE_BIN="$MOCK_DIR/claude" ./scripts/patch-claude.sh 2>&1)
          if echo "$output" | grep -q "Already patched"; then
            echo "✓ Idempotency check passed"
          else
            echo "FAIL: Second patch should detect already-patched state"
            exit 1
          fi

  test-plugins-with-patches:
    name: Test Plugins + Patches Combined
    runs-on: self-hosted
    needs: [test-plugins, test-patches, test-patches-matrix]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Make scripts executable
        run: |
          chmod +x tests/*.sh
          chmod +x scripts/*.sh
          chmod +x plugins/unleashed/*/hooks/*.sh 2>/dev/null || true

      - name: Create mock Claude Code environment
        run: |
          # Create a mock Claude Code installation
          MOCK_DIR=$(mktemp -d)
          echo "MOCK_DIR=$MOCK_DIR" >> $GITHUB_ENV

          # Create mock cli.js with v2.1.0+ patterns
          cat > "$MOCK_DIR/cli.js" << 'EOF'
          // Mock cli.js v2.1.0
          kT=["acceptEdits","bypassPermissions","default","delegate","dontAsk","plan"];
          function getModeName(mode){switch(mode){case"plan":return"Plan Mode";case"bypassPermissions":return"Bypass Permissions";case"acceptEdits":return"Accept Edits";default:return"Default"}}
          function getModeIcon(mode){switch(mode){case"acceptEdits":return"⏵⏵";case"bypassPermissions":return"⏵⏵";default:return"▶"}}
          function getNextMode(mode){switch(mode){case"default":return"plan";case"plan":return"bypassPermissions";case"bypassPermissions":return"default"}}
          if(Z.toolPermissionContext.mode==="bypassPermissions"||Z.toolPermissionContext.mode==="plan"){allowTool()}
          if(Q.mode==="bypassPermissions"){passthrough()}
          if(mode==="bypassPermissions"||V){allow()}
          function getModeColor(mode){switch(mode){case"plan":return"planMode";case"acceptEdits":return"autoAccept";case"bypassPermissions":return"error";default:return"default"}}
          if(JQ==="acceptEdits")O9("auto-accept-mode");
          if(B.mode==="delegate"&&JQ!=="delegate")ty0(!0),_uA(!0);
          EOF

          # Create mock claude binary
          cat > "$MOCK_DIR/claude" << 'SCRIPT'
          #!/usr/bin/env bash
          if [[ "$1" == "--version" ]]; then
            echo "2.1.0 (Claude Code)"
            exit 0
          fi
          exec node "$MOCK_DIR/cli.js" "$@"
          SCRIPT
          sed -i "s|\$MOCK_DIR|$MOCK_DIR|g" "$MOCK_DIR/claude"
          chmod +x "$MOCK_DIR/claude"

          # Add to PATH
          echo "$MOCK_DIR" >> $GITHUB_PATH

      - name: Apply patches
        run: |
          ./scripts/patch-claude.sh

      - name: Verify patches applied
        run: |
          CLI="$MOCK_DIR/cli.js"

          echo "Checking all patches..."

          # Check each patch
          grep -q 'kT=\[.*"auto"' "$CLI" || (echo "FAIL: Patch 1 (modes array)" && exit 1)
          grep -q 'case"auto":return"Auto Mode"' "$CLI" || (echo "FAIL: Patch 2 (display name)" && exit 1)
          grep -q 'case"auto":return"»»"' "$CLI" || (echo "FAIL: Patch 3 (icon)" && exit 1)
          grep -q 'case"bypassPermissions":return"auto"' "$CLI" || (echo "FAIL: Patch 4 (cycling)" && exit 1)
          grep -q 'mode==="auto"' "$CLI" || (echo "FAIL: Patch 5 (permissions)" && exit 1)
          grep -q 'case"auto":return"warning"' "$CLI" || (echo "FAIL: Patch 6 (color)" && exit 1)

          echo "All patches verified!"

      - name: Test auto-mode hook with patched environment
        run: |
          # Simulate the full auto-mode flow

          # 1. Create auto-mode flag (simulating shift+tab to auto mode)
          FLAG_DIR="$HOME/.cache/claude-unleashed/auto-mode"
          mkdir -p "$FLAG_DIR"
          TEST_PID="$$"
          touch "$FLAG_DIR/active-$TEST_PID"

          # 2. Test that stop hook blocks when flag exists
          export CLAUDE_WRAPPER_PID="$TEST_PID"
          output=$(./plugins/unleashed/auto-mode/hooks/auto-mode-stop.sh)

          if echo "$output" | python3 -c "import json,sys; d=json.load(sys.stdin); exit(0 if d.get('decision')=='block' else 1)"; then
            echo "PASS: Stop hook correctly blocks in auto mode"
          else
            echo "FAIL: Stop hook should block with decision:block"
            exit 1
          fi

          # 3. Clean up flag (simulating leaving auto mode)
          rm -f "$FLAG_DIR/active-$TEST_PID"

          # 4. Verify stop hook allows after flag removed
          output=$(./plugins/unleashed/auto-mode/hooks/auto-mode-stop.sh)
          if [[ -z "$output" ]]; then
            echo "PASS: Stop hook allows stop after leaving auto mode"
          else
            echo "FAIL: Stop hook should allow stop when no flag"
            exit 1
          fi

          echo "Plugins + Patches integration test passed!"

  summary:
    name: Test Summary
    runs-on: self-hosted
    needs: [shellcheck, test-cutx, test-plugins, test-patches, test-patches-matrix, test-plugins-with-patches]
    if: always()

    steps:
      - name: Generate test report
        run: |
          echo "# Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ShellCheck Linting | ${{ needs.shellcheck.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cutx Tests (Headless Mode) | ${{ needs.test-cutx.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin Tests | ${{ needs.test-plugins.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Patch Tests (Comprehensive) | ${{ needs.test-patches.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Patch Tests (Matrix: 2.1.0-2.1.5) | ${{ needs.test-patches-matrix.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-plugins-with-patches.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check test results
        run: |
          if [[ "${{ needs.shellcheck.result }}" == "success" ]] && \
             [[ "${{ needs.test-cutx.result }}" == "success" ]] && \
             [[ "${{ needs.test-plugins.result }}" == "success" ]] && \
             [[ "${{ needs.test-patches.result }}" == "success" ]] && \
             [[ "${{ needs.test-patches-matrix.result }}" == "success" ]] && \
             [[ "${{ needs.test-plugins-with-patches.result }}" == "success" ]]; then
            echo "✅ All integration tests passed!"
            exit 0
          else
            echo "❌ Some tests failed:"
            echo "  - shellcheck: ${{ needs.shellcheck.result }}"
            echo "  - test-cutx: ${{ needs.test-cutx.result }}"
            echo "  - test-plugins: ${{ needs.test-plugins.result }}"
            echo "  - test-patches: ${{ needs.test-patches.result }}"
            echo "  - test-patches-matrix: ${{ needs.test-patches-matrix.result }}"
            echo "  - test-plugins-with-patches: ${{ needs.test-plugins-with-patches.result }}"
            exit 1
          fi
