name: Build (Manual)

# Manual workflow for testing builds without creating a release
# Actual releases are handled by release-please.yml

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update && sudo apt-get install -y clang
          MOLD_VERSION=2.40.1
          curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
            | sudo tar xz -C /usr/local --strip-components=1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary
        run: |
          cp target/x86_64-unknown-linux-gnu/release/unleash unleash-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unleash-linux-x86_64
          path: unleash-linux-x86_64
