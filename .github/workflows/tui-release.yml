name: Build (Manual)

# Manual workflow for testing builds without creating a release
# Actual releases are handled by release-please.yml

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y clang mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary
        run: |
          cp target/x86_64-unknown-linux-gnu/release/cu cu-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cu-linux-x86_64
          path: cu-linux-x86_64
