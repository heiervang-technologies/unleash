name: Build (Manual)

# Manual workflow for testing builds without creating a release
# Actual releases are handled by release-please.yml

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: self-hosted
            target: x86_64-unknown-linux-gnu
            artifact: cu-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/cu ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
