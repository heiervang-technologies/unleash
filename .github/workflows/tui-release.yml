name: TUI Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/tui-release.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: claude-unleashed-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: claude-unleashed-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: claude-unleashed-macos-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/claude-unleashed ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Claude Unleashed TUI ${{ steps.version.outputs.version }}
          body: |
            Automated release of Claude Unleashed TUI.

            ## Downloads

            | Platform | Architecture | Binary |
            |----------|--------------|--------|
            | Linux | x86_64 | `claude-unleashed-linux-x86_64` |
            | macOS | x86_64 (Intel) | `claude-unleashed-macos-x86_64` |
            | macOS | ARM64 (Apple Silicon) | `claude-unleashed-macos-arm64` |

            ## Installation

            ```bash
            # Download the appropriate binary for your platform
            chmod +x claude-unleashed-*
            sudo mv claude-unleashed-* /usr/local/bin/claude-unleashed
            ```

            ## What's New

            See [CHANGELOG.md](https://github.com/heiervang-technologies/claude-unleashed/blob/main/CHANGELOG.md) for details.
          files: |
            release/*
          draft: false
          prerelease: false
