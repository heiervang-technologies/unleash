name: Lint Rust

# Gate PRs and main on clippy cleanliness.
#
# Scope: --all-targets covers lib, integration tests, examples, and benches.
# Started narrower (--lib --tests, matching #239) and widened once
# examples/poc_search.rs was cleaned — see #248.
#
# Why a dedicated workflow rather than piggybacking on coverage.yml:
#   - Coverage builds with llvm-cov instrumentation (~10 min); clippy is ~1 min
#     warm-cached. Failures should be attributable to the right check.
#   - Coverage timeout is generous because of instrumentation; we want lint
#     failures to surface fast.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'examples/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/lint.yml'

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy --all-targets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            lint-${{ runner.os }}-

      - name: cargo clippy
        run: cargo clippy --all-targets --no-deps -- -D warnings

  headless-build:
    # The `tui` feature (ratatui/crossterm + the `splash` binary) is optional so
    # Unleash compiles in headless environments. This gate proves that contract
    # holds: `cargo check --no-default-features` must stay green. The `splash`
    # binary is excluded automatically via its `required-features = ["tui"]`.
    name: cargo check --no-default-features
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: headless-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            headless-${{ runner.os }}-

      - name: cargo check --no-default-features
        run: cargo check --no-default-features --all-targets
