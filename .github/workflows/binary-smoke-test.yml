name: Binary Smoke Test

# Tests prebuilt release binaries on real platforms.
# Catches musl/glibc issues, missing deps, and runtime failures
# that don't show up when building from source.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test (e.g., v0.1.95)'
        required: true
        type: string
  # Called by the release pipeline (release-please.yml) and the manual backfill
  # (upload-release-binaries.yml) with the exact tag whose artifacts were just
  # uploaded.
  #
  # Previously this used `workflow_run` on "Upload Release Binaries" completing.
  # That was doubly broken: (1) automated releases upload binaries from within
  # the "Release Please" workflow, not "Upload Release Binaries", so the trigger
  # never fired on an automated release; and (2) a `workflow_run` event carries
  # no inputs, so the tag always fell back to the pinned `v0.0.0` default —
  # meaning every "Upload Release Binaries" completion re-smoke-tested the stale
  # v0.0.0 release instead of the tag that was actually just uploaded. (`v0.0.0`
  # is a real published release, so those runs passed — they just tested the
  # wrong, old artifacts.) Being *called* with the tag fixes both — see #401 §1.
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to test'
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: unleash-linux-x86_64
            splash: splash-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: unleash-linux-aarch64
            splash: splash-linux-aarch64
          - os: macos-latest
            artifact: unleash-macos-aarch64
            splash: splash-macos-aarch64
          # KNOWN COVERAGE GAP — macos-x86_64 (Intel): `upload-release`/`build-release`
          # ship `unleash-macos-x86_64` + `splash-macos-x86_64`, but no free
          # GitHub-hosted runner executes them natively (arm64 `macos-latest`
          # can't run Intel binaries without Rosetta plumbing, and Intel lanes
          # `macos-13`/`macos-*-large`/`-intel` are retired or paid). This lane
          # is therefore intentionally omitted, so the Intel artifact is BUILT
          # but not smoke-tested. Reopen condition: a free Intel runner becomes
          # available, or the Intel artifact is dropped from the release. Do not
          # mark #401 §1 "every shipped Linux/macOS artifact is smoke-tested"
          # closed while this gap stands.
          # - os: <free-intel-runner-when-available>
          #   artifact: unleash-macos-x86_64
          #   splash: splash-macos-x86_64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - name: Resolve tag
        id: tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          # Fail loudly on a missing tag instead of falling back to a stale
          # default and smoke-testing the wrong release's artifacts.
          if [ -z "$TAG" ]; then
            echo "::error::No release tag supplied. This workflow must be called or dispatched with the tag whose artifacts were uploaded."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download unleash binary
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/${{ matrix.artifact }}" -o unleash
          chmod +x unleash

      - name: Download splash binary
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/${{ matrix.splash }}" -o splash
          chmod +x splash

      - name: Verify binaries are executable
        run: |
          file ./unleash
          file ./splash

      - name: Test --version
        run: |
          ./unleash --version
          echo "--- version output OK ---"

      - name: Test --help
        run: |
          ./unleash --help
          echo "--- help output OK ---"

      - name: Test agent check (no npm)
        run: |
          # Remove npm from PATH to simulate no-npm environment
          export PATH=$(echo "$PATH" | tr ':' '\n' | grep -v node | grep -v npm | tr '\n' ':')
          # Should not crash with ENOENT
          ./unleash update --check 2>&1 || true
          echo "--- agent check without npm OK (no crash) ---"

      - name: Test agent check (with npm)
        run: |
          ./unleash update --check 2>&1 || true
          echo "--- agent check with npm OK ---"

      - name: Test install claude (native binary)
        run: |
          # Claude installs via native GCS binary, no npm needed
          ./unleash install claude 2>&1 || true
          echo "--- claude install attempted ---"

      - name: Test sessions list
        run: |
          ./unleash sessions 2>&1 || true
          echo "--- sessions list OK ---"

      - name: Summary
        env:
          ARTIFACT: ${{ matrix.artifact }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          {
            echo "## Smoke Test: $ARTIFACT"
            echo "- Platform: $(uname -s) $(uname -m)"
            echo "- Binary: $ARTIFACT"
            echo "- Tag: $TAG"
            echo "- Status: All checks passed"
          } >> "$GITHUB_STEP_SUMMARY"

  alpine-smoke-test:
    name: unleash-linux-x86_64 (Alpine musl)
    runs-on: ubuntu-latest
    container: alpine:latest

    steps:
      - name: Install dependencies
        run: apk add --no-cache curl file bash

      - name: Resolve tag
        id: tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          # Fail loudly on a missing tag instead of falling back to a stale
          # default and smoke-testing the wrong release's artifacts.
          if [ -z "$TAG" ]; then
            echo "::error::No release tag supplied. This workflow must be called or dispatched with the tag whose artifacts were uploaded."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download unleash binary
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/unleash-linux-x86_64" -o unleash
          chmod +x unleash

      - name: Download splash binary
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/splash-linux-x86_64" -o splash
          chmod +x splash

      - name: Verify binaries are executable
        run: |
          file ./unleash
          file ./splash

      - name: Test --version
        run: |
          ./unleash --version
          echo "--- version output OK ---"

      - name: Test --help
        run: |
          ./unleash --help
          echo "--- help output OK ---"

      - name: Test agent check
        run: |
          ./unleash update --check 2>&1 || true
          echo "--- agent check OK ---"

      - name: Test install claude (native binary)
        run: |
          ./unleash install claude 2>&1 || true
          echo "--- claude install attempted ---"

      - name: Test sessions list
        run: |
          ./unleash sessions 2>&1 || true
          echo "--- sessions list OK ---"

      - name: Summary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          {
            echo "## Smoke Test: unleash-linux-x86_64 (Alpine)"
            echo "- Platform: Alpine Linux (musl)"
            echo "- Binary: unleash-linux-x86_64"
            echo "- Tag: $TAG"
            echo "- Status: All checks passed"
          } >> "$GITHUB_STEP_SUMMARY"
