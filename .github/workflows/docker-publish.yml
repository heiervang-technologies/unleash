name: Docker Publish

# Builds and pushes the Docker image to Docker Hub on release and manual trigger.
# Requires repo secrets: DOCKER_PAT
#
# Pull requests trigger a *dry-run*: the image is built and the CLIs are
# verified, but the login and push steps are skipped. This catches problems
# in the publish path (e.g. tag format, build failures, CLI install regressions)
# at PR time rather than after merge to main.

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'plugins/**'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - 'plugins/**'
      - 'scripts/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: marksverdhei
          password: ${{ secrets.DOCKER_PAT }}

      - name: Extract metadata
        id: meta
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Tags: latest + version on release, just latest on push to main
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tags=marksverdhei/unleash:latest,marksverdhei/unleash:v${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "tags=marksverdhei/unleash:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
            --label "org.opencontainers.image.source=https://github.com/heiervang-technologies/unleash" \
            -t unleash:local .

      - name: Verify all CLIs
        run: |
          FAILED=0

          for cli in claude codex gemini opencode pi; do
            echo -n "  $cli: "
            VERSION=$(docker run --rm unleash:local $cli --version 2>&1 | grep -iE '[0-9]+\.[0-9]+' | head -1) || true
            if [ -n "$VERSION" ]; then
              echo "$VERSION"
            else
              echo "FAILED"
              docker run --rm unleash:local $cli --version 2>&1 || true
              FAILED=1
            fi
          done

          # gh needs --entrypoint since the default entrypoint is unleash
          echo -n "  gh: "
          VERSION=$(docker run --rm --entrypoint gh unleash:local --version 2>&1 | grep -iE '[0-9]+\.[0-9]+' | head -1) || true
          if [ -n "$VERSION" ]; then
            echo "$VERSION"
          else
            echo "FAILED"
            docker run --rm --entrypoint gh unleash:local --version 2>&1 || true
            FAILED=1
          fi

          # Entrypoint is already 'unleash', so just pass --version directly
          echo -n "  unleash: "
          VERSION=$(docker run --rm unleash:local --version 2>&1 | grep -iE '[0-9]+\.[0-9]+' | head -1) || true
          if [ -n "$VERSION" ]; then
            echo "$VERSION"
          else
            echo "FAILED"
            docker run --rm unleash:local --version 2>&1 || true
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo "CLI verification failed — not pushing"
            exit 1
          fi

      - name: Tag and push
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          IFS=',' read -ra TAG_ARR <<< "$TAGS"
          for tag in "${TAG_ARR[@]}"; do
            docker tag unleash:local "$tag"
            docker push "$tag"
            echo "Pushed: $tag"
          done

      - name: Summary
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAGS: ${{ steps.meta.outputs.tags }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            {
              echo "## Docker Publish (dry-run)"
              echo "- Version: $VERSION"
              echo "- Would-be tags: $TAGS"
              echo "- Push skipped: pull_request event"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Docker Image Published"
              echo "- Version: $VERSION"
              echo "- Tags: $TAGS"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Cleanup
        if: always()
        run: |
          docker rmi unleash:local 2>/dev/null || true
          docker builder prune -f --filter "until=1h" 2>/dev/null || true
