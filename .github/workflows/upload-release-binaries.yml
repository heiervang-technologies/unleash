name: Upload Release Binaries

# Manual workflow to build and upload binaries to an existing release
# Use this when a release was created without binaries

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to upload binaries to (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-and-upload:
    strategy:
      matrix:
        include:
          - os: self-hosted
            target: x86_64-unknown-linux-gnu
            artifact: cu-linux-x86_64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/cu ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: ${{ matrix.artifact }}
