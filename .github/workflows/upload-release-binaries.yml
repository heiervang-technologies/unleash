name: Upload Release Binaries

# Manual workflow to build and upload binaries to an existing release
# Use this when a release was created without binaries

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to upload binaries to (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}

      - name: Install build tools
        run: |
          sudo apt-get update && sudo apt-get install -y clang
          MOLD_VERSION=2.40.1
          curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
            | sudo tar xz -C /usr/local --strip-components=1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary and generate checksum
        run: |
          cp target/x86_64-unknown-linux-gnu/release/unleash unleash-linux-x86_64
          sha256sum unleash-linux-x86_64 > checksums.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: |
            unleash-linux-x86_64
            checksums.txt
