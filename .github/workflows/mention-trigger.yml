name: Mention Trigger

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to respond to'
        required: true
      test_prompt:
        description: 'Test prompt (optional, overrides issue content)'
        required: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  extract-context:
    runs-on: ubuntu-latest
    # TODO: Change @marksverdhai to your agent's GitHub username
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@marksverdhai')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@marksverdhai')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@marksverdhai'))
    outputs:
      prompt: ${{ steps.build-prompt.outputs.prompt }}
      issue_number: ${{ steps.extract.outputs.issue_number }}
      title: ${{ steps.extract.outputs.title }}
      progress_comment_id: ${{ steps.post-progress-comment.outputs.comment_id }}

    steps:
      - name: Extract context
        id: extract
        env:
          GH_TOKEN: ${{ secrets.HAI_GH_PAT }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_TEST_PROMPT: ${{ inputs.test_prompt }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            ISSUE_NUM="$INPUT_ISSUE_NUMBER"
            if [ -n "$INPUT_TEST_PROMPT" ]; then
              BODY="$INPUT_TEST_PROMPT"
            else
              BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body')
            fi
            TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title')
          elif [ "$EVENT_NAME" == "issues" ]; then
            BODY="$ISSUE_BODY"
            ISSUE_NUM="$ISSUE_NUMBER"
            TITLE="$ISSUE_TITLE"
          elif [ "$EVENT_NAME" == "issue_comment" ]; then
            BODY="$COMMENT_BODY"
            ISSUE_NUM="$ISSUE_NUMBER"
            TITLE="$ISSUE_TITLE"
          else
            BODY="$COMMENT_BODY"
            ISSUE_NUM="$PR_NUMBER"
            TITLE="$PR_TITLE"
          fi

          # TODO: Change @marksverdhai to your agent's GitHub username
          PROMPT=$(printf '%s' "$BODY" | sed 's/@marksverdhai//g' | tr '\n' ' ' | sed 's/  */ /g; s/^ //; s/ $//')
          {
            echo 'prompt<<EOF'
            printf '%s' "$PROMPT"
            echo
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          {
            echo 'title<<EOF'
            printf '%s' "$TITLE"
            echo
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Add eyes reaction
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Post progress tracking comment
        id: post-progress-comment
        env:
          GH_TOKEN: ${{ secrets.HAI_GH_PAT }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          TITLE: ${{ steps.extract.outputs.title }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          WORKFLOW_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          START_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          COMMENT_BODY=$(cat <<BODY
          ## 🟡 Agent Pending

          **Issue #${ISSUE_NUMBER}**: ${TITLE}
          [View workflow run](${WORKFLOW_URL})

          ### Progress
          \`░░░░░░░░░░\` 0%

          | Task | Status |
          |------|--------|
          | ⏳ Initializing agent... | 🟡 Pending |

          ### Time
          - **Started**: ${START_TIME}
          - **Estimated remaining**: Calculating...

          ---
          *This comment will be updated as I make progress.*
          BODY
          )

          RESPONSE=$(gh api \
            -X POST \
            "/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -f body="$COMMENT_BODY")

          COMMENT_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ -z "$COMMENT_ID" ] || [ "$COMMENT_ID" = "null" ]; then
            echo "::error::Failed to post progress comment"
            exit 1
          fi

          echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT

      - name: Build prompt
        id: build-prompt
        env:
          USER_PROMPT: ${{ steps.extract.outputs.prompt }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          TITLE: ${{ steps.extract.outputs.title }}
          REPO: ${{ github.repository }}
          PROGRESS_COMMENT_ID: ${{ steps.post-progress-comment.outputs.comment_id }}
        run: |
          PROMPT="You have been mentioned in GitHub issue/comment #${ISSUE_NUMBER} in repo ${REPO}.

          Title: ${TITLE}

          The user said: ${USER_PROMPT}

          Please:
          1. Use gh CLI to fetch the full issue context
          2. Understand what is being asked
          3. Respond appropriately by commenting on the issue
          4. If code changes are needed, make them and submit a PR

          ## Progress Tracking

          A progress tracking comment has been posted (comment ID: ${PROGRESS_COMMENT_ID}).
          Update it as you work using:
          \`\`\`bash
          gh api -X PATCH /repos/${REPO}/issues/comments/${PROGRESS_COMMENT_ID} -f body=\"YOUR_UPDATED_BODY\"
          \`\`\`"

          {
            echo 'prompt<<EOF'
            printf '%s' "$PROMPT"
            echo
            echo 'EOF'
          } >> $GITHUB_OUTPUT

  spawn-agent:
    needs: extract-context
    uses: heiervang-technologies/core/.github/workflows/spawn-agent.yml@main
    with:
      prompt: ${{ needs.extract-context.outputs.prompt }}
      summary_title: 'Mention Response Results'
      summary_metadata: '{"Repo": "${{ github.repository }}", "Issue": "#${{ needs.extract-context.outputs.issue_number }}"}'
      progress_comment_id: ${{ needs.extract-context.outputs.progress_comment_id }}
      issue_number: ${{ needs.extract-context.outputs.issue_number }}
      # TODO: Change to your agent's name
      agent_name: 'marksverdhai'
      agent_type: 'single-task'
    secrets:
      DOCKER_PAT: ${{ secrets.HEI_DOCKER_PAT }}
      GH_PAT: ${{ secrets.HAI_GH_PAT }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      AI_HF_TOKEN: ${{ secrets.AI_HF_TOKEN }}
      AI_PASSWORD: ${{ secrets.AI_PASSWORD }}
      AI_PHONE_HAI: ${{ secrets.AI_PHONE_HAI }}
      AI_PHONE_SMORKELBOT: ${{ secrets.AI_PHONE_SMORKELBOT }}
      AI_USERNAME: ${{ secrets.AI_USERNAME }}
      CLAUDE_CREDENTIALS_JSON: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
      CORE_BACKUP_PAT: ${{ secrets.CORE_BACKUP_PAT }}
      HAI_DOCKER_PAT: ${{ secrets.HAI_DOCKER_PAT }}
      HAI_NAME: ${{ secrets.HAI_NAME }}
      HEI_NAME: ${{ secrets.HEI_NAME }}

  post-reaction:
    needs: [extract-context, spawn-agent]
    runs-on: ubuntu-latest
    if: always() && needs.extract-context.result != 'skipped' && (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
    steps:
      - name: Add rocket reaction on success
        if: needs.spawn-agent.result == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

  update-progress-on-failure:
    needs: [extract-context, spawn-agent]
    runs-on: ubuntu-latest
    if: always() && needs.extract-context.result != 'skipped' && needs.spawn-agent.result == 'failure' && needs.extract-context.outputs.progress_comment_id != ''
    steps:
      - name: Update progress comment on failure
        env:
          GH_TOKEN: ${{ secrets.HAI_GH_PAT }}
          PROGRESS_COMMENT_ID: ${{ needs.extract-context.outputs.progress_comment_id }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          WORKFLOW_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          FAILURE_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          UPDATED_BODY="## 🔴 Agent Failed

          [View workflow run](${WORKFLOW_URL})

          ### Progress
          \`░░░░░░░░░░\` Failed

          | Task | Status |
          |------|--------|
          | Agent execution | 🔴 Failed |

          ### Time
          - **Failed at**: ${FAILURE_TIME}

          ---
          *Please check the workflow logs for details.*"

          gh api -X PATCH "/repos/${REPO}/issues/comments/${PROGRESS_COMMENT_ID}" \
            -f body="$UPDATED_BODY" || true
