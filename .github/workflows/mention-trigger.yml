name: Mention Trigger

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to respond to'
        required: true
      test_prompt:
        description: 'Test prompt (optional, overrides issue content)'
        required: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  trigger-mention-response:
    uses: heiervang-technologies/core/.github/workflows/mention-trigger-reusable.yml@main
    with:
      mention_handle: 'marksverdhai'
      agent_name: 'marksverdhai'
      agent_type: 'single-task'
      snail_image_default: '192.168.8.170:30501/snail:dev-gpu'
      postgrest_url: ${{ vars.POSTGREST_URL }}
      issue_number: ${{ inputs.issue_number }}
      test_prompt: ${{ inputs.test_prompt }}
    secrets: inherit
