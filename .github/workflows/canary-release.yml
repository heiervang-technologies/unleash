name: Canary Release

on:
  push:
    branches:
      - canary
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-canary:
    runs-on: self-hosted
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update && sudo apt-get install -y clang
          MOLD_VERSION=2.40.1
          curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
            | sudo tar xz -C /usr/local --strip-components=1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          CANARY_VERSION="${VERSION}-canary.${SHORT_SHA}"
          echo "version=${CANARY_VERSION}" >> $GITHUB_OUTPUT
          echo "Canary version: ${CANARY_VERSION}"

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary and generate checksum
        run: |
          cp target/x86_64-unknown-linux-gnu/release/unleash-canary unleash-canary-linux-x86_64
          sha256sum unleash-canary-linux-x86_64 > checksums.txt

      - name: Delete existing canary release
        run: gh release delete canary --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing canary tag
        run: git push origin :refs/tags/canary 2>/dev/null || true

      - name: Create canary release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary
          name: "Canary (${{ steps.version.outputs.version }})"
          prerelease: true
          body: |
            Canary build from `canary` branch.

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}

            This is an experimental pre-release. Use `unleash` (stable) for production.
          files: |
            unleash-canary-linux-x86_64
            checksums.txt
