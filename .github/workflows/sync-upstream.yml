name: Upstream Sync

# Triggers: Every 2 hours and manual workflow dispatch
on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-submodule:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update claude-code submodule to latest upstream
        id: update
        run: |
          BEFORE=$(git -C claude-code rev-parse HEAD)
          git submodule update --remote claude-code
          AFTER=$(git -C claude-code rev-parse HEAD)

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "Submodule already up to date ($BEFORE)"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Submodule updated: $BEFORE -> $AFTER"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "before=$BEFORE" >> $GITHUB_OUTPUT
            echo "after=$AFTER" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push submodule update
        if: steps.update.outputs.changed == 'true'
        run: |
          git add claude-code
          git commit -m "chore: sync claude-code submodule to latest upstream"
          git push origin main
