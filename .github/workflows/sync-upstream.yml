name: Upstream Sync

# Triggers: Every 2 hours and manual workflow dispatch
on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  # Job 1: Sync fork from upstream and merge to unleashed-main
  sync-fork:
    runs-on: ubuntu-latest
    outputs:
      has_conflicts: ${{ steps.merge-unleashed.outputs.has_conflicts }}
      conflict_files: ${{ steps.merge-unleashed.outputs.conflict_files }}

    steps:
      # Checkout the fork repository with full history
      - name: Checkout anthropics/claude-code
        uses: actions/checkout@v4
        with:
          repository: anthropics/claude-code
          fetch-depth: 0  # Full history for proper merge
          ref: main

      # Configure git with GitHub Actions bot credentials
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Add upstream remote pointing to anthropics/claude-code
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/anthropics/claude-code.git
          git remote -v

      # Fetch all branches and tags from both remotes
      - name: Fetch all remotes
        run: |
          git fetch --all --tags --prune

      # Ensure we're on main branch
      - name: Checkout main branch
        run: |
          git checkout main

      # Fast-forward merge from upstream/main to main
      - name: Fast-forward merge from upstream
        run: |
          git merge --ff-only upstream/main
          echo "Successfully fast-forwarded main from upstream/main"

  # Job 3: Update submodule reference on successful sync
  notify-success:
    needs: sync-fork
    if: needs.sync-fork.outputs.has_conflicts == 'false'
    runs-on: ubuntu-latest

    steps:
      # Checkout the parent repository
      - name: Checkout heiervang-technologies/claude-unleashed
        uses: actions/checkout@v4
        with:
          repository: heiervang-technologies/claude-unleashed
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: true

      # Update submodule to latest unleashed-main
      - name: Update submodule reference
        run: |
          cd claude-code
          git fetch origin
          git checkout unleashed-main
          git pull origin unleashed-main
          cd ..

          # Check if there are changes to commit
          if git diff --quiet; then
            echo "No submodule changes to commit"
            exit 0
          fi

      # Configure git
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Commit and push submodule update
      - name: Commit and push submodule update
        run: |
          git add claude-code
          git commit -m "Update claude-code submodule to latest unleashed-main (upstream sync)"
          git push origin main
