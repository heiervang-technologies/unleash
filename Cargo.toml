[package]
name = "agent-unleashed"
version = "6.0.0"
edition = "2021"
description = "Agent Unleashed - Extended CLI for AI Code Agents"
authors = ["Heiervang Technologies"]
license = "MIT"

# Binaries auto-discovered from src/bin/*.rs
# Each is a thin wrapper calling agent_unleashed::run()
# Behavior determined by argv[0]: au, aui, aug, autx, autxg

[features]
default = ["tui"]
tui = ["ratatui", "crossterm"]

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# TUI (optional - disable for headless environments)
ratatui = { version = "0.29", optional = true }
crossterm = { version = "0.28", optional = true }

# Config
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
dirs = "6.0"

# Process management
nix = { version = "0.29", features = ["process", "signal"] }
which = "7.0"

# Async (for tmux mode)
ctrlc = "3.4"

[dev-dependencies]
tempfile = "3.15"

[profile.release]
lto = true
codegen-units = 1
strip = true

# Fast release builds for development (use: cargo build --profile fast)
[profile.fast]
inherits = "release"
lto = false
codegen-units = 16

# Claude Code version management
# default_mode: "whitelist" (only allow listed) or "blacklist" (block listed)
# Users can override mode in ~/.config/agent-unleashed/config.toml with version_filter_mode
[package.metadata.claude-code-versions]
default_mode = "whitelist"

# Whitelist - verified working versions (used when mode = "whitelist")
# Only these versions will be installed when using "latest"
# Users can override by creating ~/.config/agent-unleashed/whitelist.txt
[package.metadata.claude-code-whitelist]
versions = ["2.1.37", "2.1.32", "2.1.29", "2.1.22", "2.1.12", "2.1.4", "2.1.3", "2.1.2", "2.0.77"]

# Blacklist - versions with known critical issues (used when mode = "blacklist")
# These versions are skipped when installing "latest"
# Users can override by creating ~/.config/agent-unleashed/blacklist.txt
[package.metadata.claude-code-blacklist]
versions = ["2.1.5", "2.1.1", "2.1.0"]

# Codex CLI version management
# Same filtering mechanism as Claude Code (whitelist/blacklist)
# Versions fetched from GitHub releases (tags matching rust-v*)
[package.metadata.codex-versions]
default_mode = "whitelist"

# Whitelist - verified working Codex versions
# Users can override by creating ~/.config/agent-unleashed/codex-whitelist.txt
[package.metadata.codex-whitelist]
versions = ["0.98.0", "0.93.0", "0.92.0", "0.91.0", "0.90.0"]

# Blacklist - Codex versions with known issues
# Users can override by creating ~/.config/agent-unleashed/codex-blacklist.txt
[package.metadata.codex-blacklist]
versions = []
