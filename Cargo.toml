[package]
name = "unleashed-tui"
version = "0.1.0"
edition = "2021"
description = "Claude Unleashed TUI - Launcher and settings UI for Claude Code"

[[bin]]
name = "claude-unleashed"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
dirs = "6.0"

[dev-dependencies]
tempfile = "3.15"
