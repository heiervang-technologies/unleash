[package]
name = "claude-unleashed"
version = "1.0.0-91f740b"
edition = "2024"
description = "Claude Unleashed - Extended CLI for Claude Code"

[[bin]]
name = "cui"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
dirs = "6.0"

[dev-dependencies]
tempfile = "3.15"
