[package]
name = "claude-unleashed"
version = "3.0.0"
edition = "2021"
description = "Claude Unleashed - Extended CLI for Claude Code"
authors = ["Heiervang Technologies"]
license = "MIT"

# All binaries point to the same source - behavior determined by argv[0]
[[bin]]
name = "cu"
path = "src/main.rs"

[[bin]]
name = "cui"
path = "src/main.rs"

[[bin]]
name = "cug"
path = "src/main.rs"

[[bin]]
name = "cutx"
path = "src/main.rs"

[features]
default = ["tui"]
tui = ["ratatui", "crossterm"]

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# TUI (optional - disable for headless environments)
ratatui = { version = "0.29", optional = true }
crossterm = { version = "0.28", optional = true }

# Config
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
dirs = "6.0"

# Process management
nix = { version = "0.29", features = ["process", "signal"] }
which = "7.0"

# Async (for tmux mode)
ctrlc = "3.4"

[dev-dependencies]
tempfile = "3.15"

[profile.release]
lto = true
codegen-units = 1
strip = true

# Claude Code version blacklist - versions known to have critical issues
# These are skipped when installing "latest"
# Users can override by creating ~/.config/claude-unleashed/blacklist.txt
[package.metadata.claude-code-blacklist]
versions = ["2.1.5", "2.1.1", "2.1.0"]
