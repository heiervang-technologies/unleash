apiVersion: apps/v1
kind: Deployment
metadata:
  name: snail-tmux
  labels:
    app: snail-tmux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snail-tmux
  template:
    metadata:
      labels:
        app: snail-tmux
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: snail
          image: marksverdhei/snail:dev-gpu
          imagePullPolicy: Always
          args: ["bash", "-c", "/opt/claude-unleashed/scripts/cutx start --auto 'ping' && sleep infinity"]
          tty: true
          stdin: true
          env:
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: snail-secrets
                  key: claude-oauth-token
            - name: AI_GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: snail-secrets
                  key: github-token
                  optional: true
            - name: SIGNAL_USER
              valueFrom:
                secretKeyRef:
                  name: snail-secrets
                  key: signal-user
                  optional: true
          resources:
            requests:
              memory: "8Gi"
              cpu: "2"
          volumeMounts:
            - name: home-data
              mountPath: /home/me
            - name: claude-cache
              mountPath: /home/me/.claude
          ports:
            - containerPort: 22
              name: ssh
          securityContext:
            privileged: true
      volumes:
        - name: home-data
          persistentVolumeClaim:
            claimName: snail-home-pvc
        - name: claude-cache
          emptyDir: {}
      nodeSelector:
        kubernetes.io/hostname: centurion
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: snail-tmux
spec:
  selector:
    app: snail-tmux
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30022
  type: NodePort
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snail-home-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: local-path
---
# Secret template - create with:
# kubectl create secret generic snail-secrets \
#   --from-literal=claude-oauth-token='YOUR_TOKEN' \
#   --from-literal=github-token='YOUR_GH_TOKEN' \
#   --from-literal=signal-user='+1234567890'
#
# Or apply this with base64-encoded values:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: snail-secrets
# type: Opaque
# data:
#   claude-oauth-token: <base64>
#   github-token: <base64>
#   signal-user: <base64>
