# OpenRouter Configuration
model_provider = "openrouter"
model = "gpt-5.2-codex"
personality = "pragmatic"
model_reasoning_effort = "high"

[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
wire_api = "responses"


[model_providers.local]
name = "local"
base_url = "http://192.168.8.158:30180/v1"
env_key = "OPENROUTER_API_KEY"
wire_api = "responses"

[profiles.coder-next]
model = "gpt-5.2-codex"
model_provider = "local"
model_reasoning_effort = "high"

# Profile for OpenRouter (explicit, same as default)
[profiles.openrouter]
model = "gpt-5.2-codex"
model_provider = "openrouter"

# Profile for Minimax model
[profiles.minimax]
model = "minimax/minimax-m2.1"
model_provider = "openrouter"

# Profile for Pony Alpha (via OpenRouter, chat API)
[profiles.pony]
model = "openrouter/pony-alpha"
model_provider = "openrouter"


[profiles.glm5]
model = "openrouter/glm-5"
model_provider = "openrouter"


# Profile for OpenAI direct
[profiles.openai]
model = "codex-5.3"
model_provider = "openai"

[projects."/home/me/claude-unleashed"]
trust_level = "trusted"

[projects."/home/me/ht/agent-unleashed"]
trust_level = "trusted"

[projects."/home/me"]
trust_level = "untrusted"
