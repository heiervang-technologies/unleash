# Linker config is auto-detected at build time.
# If clang + mold are available, install.sh passes them via env vars.
# To manually use mold, run:
#   CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang \
#   CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="-C link-arg=-fuse-ld=mold" \
#   cargo build --release
