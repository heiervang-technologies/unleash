# Override: run without gVisor sandbox (standard runc, default network)
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.unsandboxed.yml run --rm claude

services:
  unleash:
    runtime: runc
    networks:
      - default

networks:
  sandbox:
    external: false
    name: unleash-unsandboxed-default
    driver: bridge
